name: Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML sanity check
        run: |
          grep -q "<!DOCTYPE html>" index.html || (echo "Missing DOCTYPE" && exit 1)
          grep -q "Bühlmann" index.html        || (echo "Missing algorithm content" && exit 1)
          grep -q "buildExportText" index.html || (echo "Missing export function" && exit 1)
          echo "✓ HTML content checks passed"

      - name: File size check
        run: |
          SIZE=$(wc -c < index.html)
          LINES=$(wc -l < index.html)
          echo "Size: $SIZE bytes, Lines: $LINES"
          [ $SIZE -gt 10000 ] || (echo "File too small" && exit 1)
          echo "✓ Size OK"

      - name: JSON validation
        run: |
          python3 -m json.tool package.json > /dev/null && echo "✓ package.json"
          python3 -m json.tool manifest.json > /dev/null && echo "✓ manifest.json"

      - name: SHA256
        run: |
          sha256sum index.html
