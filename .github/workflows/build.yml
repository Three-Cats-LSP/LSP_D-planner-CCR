name: Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          if ! grep -q "<!DOCTYPE html>" index.html; then
            echo "Error: Missing DOCTYPE"
            exit 1
          fi
          echo "✓ HTML structure valid"

      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          echo "index.html: $SIZE bytes"
          if [ $SIZE -lt 10000 ]; then
            echo "Error: File suspiciously small"
            exit 1
          fi
          echo "✓ File size OK"

      - name: Compute and record SHA256
        run: |
          SHA=$(sha256sum index.html | awk '{print $1}')
          echo "SHA256: $SHA"
          echo "$SHA  index.html" > SHA256.txt
          echo "✓ Hash recorded"

      - name: Validate JSON
        run: |
          for f in package.json manifest.json; do
            [ -f "$f" ] && python3 -m json.tool "$f" > /dev/null && echo "✓ $f valid"
          done

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Compute SHA256
        id: sha
        run: echo "hash=$(sha256sum index.html | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: index.html
          draft: false
          prerelease: false
          body: |
            # LSP D-PLANNER v${{ steps.version.outputs.version }}

            Single-file browser-based dive planner. Download `index.html` and open in any browser. Works offline.

            **SHA256:** `${{ steps.sha.outputs.hash }}`

            See [CHANGELOG.md](https://github.com/Three-Cats-LSP/LSP_D-planner/blob/main/CHANGELOG.md) for what changed.

            > Planning aid only — not a substitute for dive training, certification, or a dive computer.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
