name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Android Apk/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Copy web content into Android assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html android/app/src/main/assets/www/index.html

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Place APK at output location
        run: |
          mkdir -p "Android Apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "Android Apk/LSP_D-planner.apk"

      - name: Commit APK back to main
        run: |
          git config user.email "sns@rvm.cc"
          git config user.name "Three Cats LSP"
          git add "Android Apk/LSP_D-planner.apk"
          git commit -m "build(android): update LSP_D-planner.apk [skip ci]" --allow-empty
          git pull --rebase origin main
          git push
