name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
      
      - name: Verify Java version
        run: java -version
          
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        
      - name: Create Android project
        run: |
          mkdir -p android-app/app/src/main/java/com/example/lspdplanner
          mkdir -p android-app/app/src/main/res/layout
          mkdir -p android-app/app/src/main/res/values
          mkdir -p android-app/app/src/main/assets
          cp index.html android-app/app/src/main/assets/
          
      - name: Create root build.gradle
        run: |
          cat > android-app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '7.4.2' apply false
          }
          GRADLE
          
      - name: Create settings.gradle
        run: |
          cat > android-app/settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  gradlePluginPortal()
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          include ':app'
          SETTINGS
          
      - name: Create app/build.gradle
        run: |
          cat > android-app/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '7.4.2'
          }
          
          android {
              compileSdk 34
              
              defaultConfig {
                  applicationId 'com.example.lspdplanner'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '5.6.3'
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              
              namespace 'com.example.lspdplanner'
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          GRADLE
          
      - name: Create AndroidManifest.xml
        run: |
          cat > android-app/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.example.lspdplanner">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="@string/app_name">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
      - name: Create MainActivity.java
        run: |
          cat > android-app/app/src/main/java/com/example/lspdplanner/MainActivity.java << 'JAVA'
          package com.example.lspdplanner;
          import android.os.Bundle;
          import android.webkit.WebView;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  WebView web = findViewById(R.id.webview);
                  web.getSettings().setJavaScriptEnabled(true);
                  web.loadUrl("file:///android_asset/index.html");
              }
          }
          JAVA
          
      - name: Create layouts and resources
        run: |
          cat > android-app/app/src/main/res/layout/activity_main.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </FrameLayout>
          XML
          
          cat > android-app/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LSP D-PLANNER</string>
          </resources>
          STRINGS
          
      - name: Create gradle wrapper files
        run: |
          mkdir -p android-app/gradle/wrapper
          
          cat > android-app/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS
          
      - name: Create gradlew script
        run: |
          cat > android-app/gradlew << 'GRADLEW'
          #!/bin/sh
          
          APP_NAME="Gradle"
          APP_BASE_NAME=`basename "$0"`
          
          exec java -XX:+IgnoreUnrecognizedVMOptions -XX:+UseG1GC -XX:+UseStringDeduplication -Xmx1024m -Dorg.gradle.appname="$APP_NAME" -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW
          
          chmod +x android-app/gradlew
          
      - name: Build APK
        run: |
          cd android-app
          ./gradlew --version
          ./gradlew assembleDebug --stacktrace
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
          
      - name: Prepare APK folder
        run: |
          mkdir -p APK
          find android-app -name "*.apk" -type f -exec cp {} APK/LSP_D-Planner.apk \;
          ls -lah APK/
          echo "✅ APK built successfully!"
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LSP_D-Planner
          path: APK/
          retention-days: 30
          
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: APK/LSP_D-Planner.apk
          prerelease: false
          body: |
            LSP D-PLANNER v5.6.3
            
            Professional Dive Planning Tool for Android
            
            Installation:
            1. Download LSP_D-Planner.apk
            2. Enable "Unknown Sources" in Settings
            3. Install the APK
            4. Launch LSP D-PLANNER
            
            Features:
            - PADI REC calculations
            - Bühlmann ZH-L16C algorithm
            - Emergency planning
            - Offline capable
            
            Safety:
            Training & Planning Use Only - Always use a dive computer

