name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Install Gradle
        run: |
          cd android
          curl -L https://services.gradle.org/distributions/gradle-8.4-bin.zip -o gradle.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-8.4/bin:$PATH
          gradle --version
      
      - name: Build APK
        run: |
          cd android
          export PATH=$PWD/gradle-8.4/bin:$PATH
          gradle assembleRelease 2>&1
      
      - name: Verify APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found at $APK_PATH"
            ls -lh "$APK_PATH"
          else
            echo "❌ APK not found"
            find android -name "*.apk" -type f
            exit 1
          fi
      
      - name: Create APK Folder and Copy APK
        run: |
          mkdir -p APK
          APK_FILENAME="dive-planner-$(date +%Y%m%d-%H%M%S).apk"
          cp android/app/build/outputs/apk/release/app-release.apk "APK/$APK_FILENAME"
          ls -lh "APK/$APK_FILENAME"
          echo "APK_FILE=$APK_FILENAME" >> $GITHUB_ENV
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Commit APK
        run: |
          git add APK/
          git commit -m "🤿 Auto-build APK: ${{ env.APK_FILE }}" || echo "Nothing to commit"
      
      - name: Push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote remove origin
          git remote add origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
          git push origin HEAD:main --force || git push origin HEAD:main
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: APK/
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: APK/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
