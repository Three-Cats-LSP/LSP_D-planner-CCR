name: Build Android APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Android Apk/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract app version from index.html
        id: version
        run: |
          # Extract the version string e.g. "2.7.4"
          VERSION=$(grep -oP "APP_VERSION\s*=\s*'\K[^']+" index.html)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # Convert dotted version to integer versionCode (e.g. 2.7.4 -> 20704)
          IFS='.' read -ra PARTS <<< "$VERSION"
          MAJOR="${PARTS[0]:-0}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:-0}"
          VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (code: $VERSION_CODE)"

      - name: Patch build.gradle with extracted version
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.VERSION_CODE }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.VERSION }}\"/" android/app/build.gradle
          echo "build.gradle after patch:"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Copy web content into Android assets
        run: |
          mkdir -p android/app/src/main/assets/www
          cp index.html android/app/src/main/assets/www/index.html

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Place APK at output location
        run: |
          mkdir -p "Android Apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "Android Apk/LSP_D-planner.apk"

      - name: Commit APK back to main
        run: |
          git config user.email "sns@rvm.cc"
          git config user.name "Three Cats LSP"
          git add "Android Apk/LSP_D-planner.apk"
          git commit -m "build(android): update LSP_D-planner.apk v${{ steps.version.outputs.VERSION }} [skip ci]" --allow-empty
          git pull --rebase origin main
          git push
