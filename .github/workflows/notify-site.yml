name: Notify Site on Push

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'download.html'
      - 'manifest.json'
      - 'sw.js'
      - 'capacitor-bridge.js'
      - 'tests.html'
      - 'tests-extended.html'
      - 'tests-massive.html'
      - 'tests-massive-main.html'
      - 'tests-verify.html'
      - 'tests-pscr-otu-cns.html'
      - 'lsp-test-harness.js'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger site sync
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::SYNC_TOKEN secret is not configured on this repo."
            echo "Add the same SYNC_TOKEN used by Three-Cats-LSP/LSP_D-planner so threecats-lsp.com auto-syncs."
            exit 1
          fi
          curl -fsS -X POST \
            -H "Authorization: token ${SYNC_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Three-Cats-LSP/threecats-lsp.com/dispatches \
            -d '{"event_type":"sync-d-planner-ccr"}'
