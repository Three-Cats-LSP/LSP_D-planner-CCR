<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSP D-Planner — Test Suite</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--faint:#484f58;--pass:#3fb950;--fail:#f85149;--skip:#d29922;--accent:#58a6ff;--r:6px;--font:'Satoshi','Inter',system-ui,sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text);min-height:100dvh;padding:32px 24px}
  header{margin-bottom:4px}
  h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .sub{font-size:12px;color:var(--muted);letter-spacing:.3px;margin-bottom:20px}
  #sumbar{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:20px;font-size:13px;flex-wrap:wrap;min-height:48px}
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700}
  .pill.p{background:rgba(63,185,80,.15);color:var(--pass)}.pill.f{background:rgba(248,81,73,.15);color:var(--fail)}.pill.s{background:rgba(210,153,34,.15);color:var(--skip)}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;font-size:13px}
  thead th{background:rgba(88,166,255,.06);color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid rgba(48,54,61,.5)}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:rgba(255,255,255,.02)}
  td{padding:8px 14px;vertical-align:middle}
  td:first-child{color:var(--faint);font-size:11px;font-weight:700;width:32px;text-align:center;font-family:monospace}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}
  .badge.PASS{background:rgba(63,185,80,.15);color:var(--pass)}.badge.FAIL{background:rgba(248,81,73,.18);color:var(--fail)}.badge.SKIP{background:rgba(210,153,34,.15);color:var(--skip)}
  .tn{font-weight:500;color:var(--text);line-height:1.3}.tg{font-size:11px;color:var(--muted);margin-top:2px}
  .det{font-family:'JetBrains Mono','Fira Mono',monospace;font-size:11px;color:var(--muted);word-break:break-all}.det.e{color:#f85149}
  .sh td{background:rgba(88,166,255,.05);color:var(--accent);font-weight:700;font-size:11px;letter-spacing:.8px;text-transform:uppercase;padding:7px 14px;border-bottom:1px solid var(--border)}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  details{margin-top:16px}summary{cursor:pointer;color:var(--accent);font-size:12px;font-weight:600;padding:4px 0}
  #dbg{margin-top:8px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.7}
</style>
</head>
<body>
<header><h1>LSP D-Planner — Test Suite</h1></header>
<div class="sub">VPM-B · Bühlmann ZHL-16C · Tool math verification</div>
<div id="sumbar"><span id="smsg"><span class="spin"></span>Loading…</span></div>
<table>
  <thead><tr><th>#</th><th>Test</th><th>Result</th><th>Detail</th></tr></thead>
  <tbody id="tb"></tbody>
</table>
<details><summary>▸ Debug log</summary><div id="dbg">waiting…</div></details>

<script>
// ─────────────────────────────────────────────────────────────────────────
//  LSP D-Planner Test Runner  v5
//
//  From debug output we now know exactly:
//    - VPMEngine is an arrow IIFE: const VPMEngine = (() => { ... })()
//    - MODELS = ["VPMA","VPMB","VPMBE","VPMB_GFS","VPMBFBO"]  (string keys)
//    - MODEL_NAMES also exposed
//    - SURFACEP / BARPERMETRE are in a DIFFERENT script block
//    - Engine block starts at char 212678, is 74,595 chars
// ─────────────────────────────────────────────────────────────────────────

const dbgEl=document.getElementById('dbg');
const smsg =document.getElementById('smsg');
const tb   =document.getElementById('tb');
let logs=[],P=0,F=0,SK=0,idx=0;
function log(...a){logs.push(a.join(' '));dbgEl.textContent=logs.join('\n');}
function sec(l){const t=document.createElement('tr');t.className='sh';t.innerHTML=`<td colspan="4">${l}</td>`;tb.appendChild(t);}
function assert(name,cond,detail='',group=''){
  idx++;
  const st=cond===null?'SKIP':cond?'PASS':'FAIL';
  if(st==='PASS')P++;else if(st==='FAIL')F++;else SK++;
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${idx}</td><td><div class="tn">${name}</div>${group?`<div class="tg">${group}</div>`:''}</td><td><span class="badge ${st}">${{PASS:'✓',FAIL:'✗',SKIP:'—'}[st]} ${st}</span></td><td><span class="det${st==='FAIL'?' e':''}">${detail}</span></td>`;
  tb.appendChild(tr);
}
function near(a,b,t){return typeof a==='number'&&Math.abs(a-b)<=t;}

function extractBalanced(src,pos,open,close){
  let depth=0,i=pos,inStr=false,strCh='',inLC=false,inBC=false;
  while(i<src.length){
    if(inBC){if(src[i]==='*'&&src[i+1]==='/')inBC=false,i+=2;else i++;continue;}
    if(inLC){if(src[i]==='\n')inLC=false;i++;continue;}
    const ch=src[i];
    if(inStr){if(ch==='\\'){i+=2;continue;}if(ch===strCh)inStr=false;}
    else{
      if(ch==='/'&&src[i+1]==='*'){inBC=true;i+=2;continue;}
      if(ch==='/'&&src[i+1]==='/'){inLC=true;i+=2;continue;}
      if(ch==='"'||ch==="'"||ch==='`'){inStr=true;strCh=ch;}
      else if(ch===open){depth++;}
      else if(ch===close){depth--;if(depth===0)return i;}
    }
    i++;
  }
  return -1;
}

async function loadEngine(){
  log('Fetching index.html…');
  let src;
  try{const res=await fetch('./index.html');if(!res.ok)throw new Error(`HTTP ${res.status}`);src=await res.text();}
  catch(e){log('fetch failed: '+e.message);return null;}
  log(`Fetched: ${src.length.toLocaleString()} chars`);

  // ── 1. Extract VPMEngine IIFE ───────────────────────────────────────────
  let vePos=-1,s=0;
  while(true){const f=src.indexOf('const VPMEngine',s);if(f===-1)break;vePos=f;s=f+1;}
  if(vePos===-1){log('ERROR: const VPMEngine not found');return null;}
  log(`const VPMEngine at ${vePos}`);
  const eqPos=src.indexOf('=',vePos+15);
  let rhs=eqPos+1;
  while(rhs<src.length&&' \n\r\t'.includes(src[rhs]))rhs++;
  log(`RHS char: "${src[rhs]}"`);

  // The RHS is (() => { ... })() — arrow IIFE
  // Find the outer () wrapper end, then the trailing ()
  let rhsEnd=extractBalanced(src,rhs,'(',')');
  if(rhsEnd===-1){log('ERROR: unmatched parens');return null;}
  // Check for trailing () invocation
  let after=rhsEnd+1;
  while(after<src.length&&' \n\r\t'.includes(src[after]))after++;
  if(src[after]==='('){
    const end2=extractBalanced(src,after,'(',')');
    if(end2!==-1)rhsEnd=end2;
  }
  const engineRHS=src.substring(rhs,rhsEnd+1);
  log(`Engine RHS: ${engineRHS.length.toLocaleString()} chars`);

  // ── 2. Extract SURFACEP & BARPERMETRE from ALL script blocks ───────────
  log('\nScanning all script blocks for constants…');
  let SP=null,BPM=null;

  // First try: grep raw source with regex (works regardless of scope)
  const spM =src.match(/const\s+SURFACEP\s*=\s*([\d.]+)/);
  const bpmM=src.match(/const\s+BARPERMETRE\s*=\s*([\d.]+)/);
  const slpM=src.match(/const\s+SLPSWM\s*=\s*([\d.]+)/);
  if(spM) { SP =parseFloat(spM[1]);  log(`  regex SURFACEP=${SP}`); }
  if(bpmM){ BPM=parseFloat(bpmM[1]); log(`  regex BARPERMETRE=${BPM}`); }
  if(!BPM&&slpM){ BPM=1/parseFloat(slpM[1]); log(`  derived BARPERMETRE from SLPSWM=${slpM[1]} → ${BPM}`); }

  // If not found as standalone const, try expressions like: 1/10.078
  if(!SP){
    // Common pattern: SURFACEP = 1.01325 or 1.013 or 101.325/100
    const m2=src.match(/SURFACEP\s*=\s*([0-9./]+)/);
    if(m2){try{SP=(new Function(`return ${m2[1]}`))()} catch(e){}}
    if(SP) log(`  expr SURFACEP=${SP}`);
  }

  // ── 3. Extract any constants the engine references ──────────────────────
  // From debug: only NC and GAMMA were found. Let's also grab SLPSWM etc.
  const constNames=['NC','GAMMA','GAMMAC','INITIALRADIUSN2','INITIALRADIUSHe',
    'REGENTIME','WATERVAPORPRESSURE','CONSTANTPRESSUREOTHERGASES',
    'CRITVOLUMELAMBDAFSWMIN','SLPSWM','SLPFWM'];
  let constCode='';
  for(const n of constNames){
    const re=new RegExp(`(?:const|var|let)\\s+${n}\\s*=\\s*([^;\\n]+)`,'g');
    let m,last=null;
    while((m=re.exec(src))!==null)last=m[1].trim();
    if(last){
      try{
        const val=(new Function(`return (${last})`))();
        constCode+=`var ${n}=${JSON.stringify(val)};\n`;
        log(`  ${n}=${val}`);
      }catch(e){log(`  ${n} raw="${last}" (skip: ${e.message})`)}
    }
  }

  // ── 4. Build and eval ───────────────────────────────────────────────────
  const script=`(function(){
  "use strict";
  ${constCode}
  var __E = ${engineRHS};
  return __E;
})()`;

  log(`\nScript: ${script.length.toLocaleString()} chars`);
  log('Preview:\n'+script.substring(0,300));

  let engine;
  try{engine=(new Function('return '+script))();}
  catch(e){
    log(`\neval FAILED: ${e.message}`);
    return null;
  }

  log(`\neval OK`);
  log(`engine.calculate: ${typeof engine?.calculate}`);
  log(`engine.MODELS: ${JSON.stringify(engine?.MODELS)}`);
  log(`engine.MODEL_NAMES: ${JSON.stringify(engine?.MODEL_NAMES)}`);
  log(`SURFACEP: ${SP}, BARPERMETRE: ${BPM}`);

  if(!engine||typeof engine.calculate!=='function'){
    log('engine.calculate not a function — keys: '+Object.keys(engine||{}).join(', '));
    return null;
  }

  // ── 5. Resolve named model identifiers ─────────────────────────────────
  // MODELS = ["VPMA","VPMB","VPMBE","VPMB_GFS","VPMBFBO"]
  // Use the string names directly — no probing needed.
  const M=engine.MODELS||[];
  const MN=engine.MODEL_NAMES||{};
  log(`\nMODELS array: ${JSON.stringify(M)}`);

  // Find by name pattern
  function findModel(...candidates){
    for(const c of candidates){
      if(M.includes(c))return c;
      // also check MODEL_NAMES values
      const byName=Object.entries(MN).find(([k,v])=>v===c||k===c);
      if(byName)return byName[0];
    }
    return M[0]??null; // fallback to first
  }

  const VPMB   =findModel('VPMB');
  const VPMBE  =findModel('VPMBE','VPMB_E');
  const VPMBGFS=findModel('VPMB_GFS','VPMBGFS','VPMB_GF');
  const VPMA   =findModel('VPMA');
  const VPMBFBO=findModel('VPMBFBO','VPMB_FBO');

  log(`Resolved: VPMA=${VPMA} VPMB=${VPMB} VPMBE=${VPMBE} VPMBGFS=${VPMBGFS} VPMBFBO=${VPMBFBO}`);

  return{engine,SP,BPM,VPMB,VPMBE,VPMBGFS,VPMA,VPMBFBO,
         models:M,mCount:M.length};
}

function runTests(R){
  const E=R?.engine??null,SP=R?.SP??null,BPM=R?.BPM??null;
  const VPMB=R?.VPMB,VPMBE=R?.VPMBE,VPMBGFS=R?.VPMBGFS,VPMA=R?.VPMA,VPMBFBO=R?.VPMBFBO;
  const models=R?.models??[],mCount=R?.mCount??0;

  function calc(depth,bt,model,extra={}){
    if(!E)return{error:'no engine'};
    try{return E.calculate(
      [{depth,time:bt,o2:21,he:0}],
      [{o2:50,he:0,label:'EAN50'},{o2:100,he:0,label:'100% O2'}],
      {metric:true,waterType:0,descentRate:22,ascentRate:9,decoAscentRate:9,
       surfaceAscentRate:9,stepSize:3,lastStop:3,minStopTime:1,
       ppO2Bottom:1.4,ppO2Deco:1.6,ppO2Low:1.4,ppO2Mid:1.5,ppO2High:1.6,
       o2MaxDepth:6,conservatism:0,gfHi:85,gfs:85,...extra},model);
    }catch(e){return{error:e.message};}
  }
  function deco(r){return(r.stops||[]).reduce((a,s)=>a+s.time,0);}
  function hasStops(r){return(r.stops||[]).some(s=>s.time>0);}

  // ── 1. Engine ────────────────────────────────────────────────────────────
  sec('1 · Engine');
  assert('VPMEngine loaded',           E!=null,                          `type=${typeof E}`,'fetch + extract');
  assert('VPMEngine.calculate is fn',  typeof E?.calculate==='function', `typeof=${typeof E?.calculate}`,'');
  assert('MODELS array has entries',   mCount>0,                         `[${models.join(', ')}]`,'VPMEngine.MODELS');
  assert('"VPMB" in MODELS',           models.includes('VPMB'),          `models=${JSON.stringify(models)}`,'');
  assert('"VPMB_GFS" in MODELS',       models.includes('VPMB_GFS'),      `models=${JSON.stringify(models)}`,'');

  // ── 2. Physical constants ─────────────────────────────────────────────
  sec('2 · Physical constants');
  assert('SURFACEP ≈ 1.013 bar',        near(SP,1.013,0.01),    SP!=null?`got ${SP}`:'not found in source','sea level');
  assert('BARPERMETRE ≈ 0.0993 bar/m',  near(BPM,0.0993,0.005), BPM!=null?`got ${BPM}`:'not found','1/SLPSWM');

  if(!E||typeof E.calculate!=='function'){
    assert('(remaining tests skipped)',null,'no engine','');finalize();return;
  }

  // ── 3. No-deco boundary ───────────────────────────────────────────────
  sec('3 · No-deco boundary (VPM-B)');
  const r20=calc(20,20,VPMB);
  assert('20m/20min → 0 deco stops', !r20.error&&!hasStops(r20),
    r20.error||`rt=${r20.totalRuntime?.toFixed(1)}min`,'NDL');
  const r15=calc(15,60,VPMB);
  assert('15m/60min → 0 deco stops', !r15.error&&!hasStops(r15),
    r15.error||`rt=${r15.totalRuntime?.toFixed(1)}min`,'NDL edge');

  // ── 4. Deco dives ────────────────────────────────────────────────────
  sec('4 · Deco dive correctness (VPM-B)');
  const r40=calc(40,25,VPMB);
  assert('40m/25min → deco required',   !r40.error&&hasStops(r40),
    r40.error||`deco=${deco(r40).toFixed(0)}min, rt=${r40.totalRuntime?.toFixed(1)}min`,'VPM-B');
  assert('40m/25min runtime 35–90min',  !r40.error&&r40.totalRuntime>35&&r40.totalRuntime<90,
    r40.error||`rt=${r40.totalRuntime?.toFixed(1)}min`,'sanity');
  const r50=calc(50,30,VPMB);
  assert('50m/30min → deco required',   !r50.error&&hasStops(r50),
    r50.error||`deco=${deco(r50).toFixed(0)}min`,'VPM-B');
  assert('50m → more deco than 40m',    !r40.error&&!r50.error&&deco(r50)>=deco(r40),
    `40m=${deco(r40).toFixed(0)} 50m=${deco(r50).toFixed(0)}min`,'depth monotonicity');

  // ── 5. All 5 models ──────────────────────────────────────────────────
  sec('5 · All models (45m/30min)');
  const rA=calc(45,30,VPMA),rB=calc(45,30,VPMB),rBE=calc(45,30,VPMBE),
        rBG=calc(45,30,VPMBGFS),rBF=calc(45,30,VPMBFBO);
  assert('VPMA computes',    !rA.error&&(rA.totalRuntime||0)>0,  rA.error||`rt=${rA.totalRuntime?.toFixed(1)}min`,'');
  assert('VPMB computes',    !rB.error&&(rB.totalRuntime||0)>0,  rB.error||`rt=${rB.totalRuntime?.toFixed(1)}min`,'');
  assert('VPMBE computes',   !rBE.error&&(rBE.totalRuntime||0)>0,rBE.error||`rt=${rBE.totalRuntime?.toFixed(1)}min`,'');
  assert('VPMB_GFS computes',!rBG.error&&(rBG.totalRuntime||0)>0,rBG.error||`rt=${rBG.totalRuntime?.toFixed(1)}min`,'');
  assert('VPMBFBO computes', !rBF.error&&(rBF.totalRuntime||0)>0,rBF.error||`rt=${rBF.totalRuntime?.toFixed(1)}min`,'');
  // VPMB_GFS uses gradient factors → generally longer than VPMB
  assert('VPMB_GFS runtime ≥ VPMB', !rB.error&&!rBG.error&&(rBG.totalRuntime||0)>=(rB.totalRuntime||0),
    `VPMB=${rB.totalRuntime?.toFixed(1)}, VPMB_GFS=${rBG.totalRuntime?.toFixed(1)}`,'ordering');

  // ── 6. Monotonicity ──────────────────────────────────────────────────
  sec('6 · Deco time monotonicity (VPM-B)');
  const r30=calc(30,30,VPMB),r60=calc(60,30,VPMB);
  assert('60m deco ≥ 30m deco',      !r30.error&&!r60.error&&deco(r60)>=deco(r30),
    `30m=${deco(r30).toFixed(0)} 60m=${deco(r60).toFixed(0)}min`,'depth');
  const r40a=calc(40,20,VPMB),r40b=calc(40,40,VPMB);
  assert('40min BT deco ≥ 20min BT', !r40a.error&&!r40b.error&&deco(r40b)>=deco(r40a),
    `20min=${deco(r40a).toFixed(0)} 40min=${deco(r40b).toFixed(0)}min`,'BT');

  // ── 7. Conservatism ──────────────────────────────────────────────────
  sec('7 · Conservatism (VPM-B, 40m/25min)');
  const rc0=calc(40,25,VPMB,{conservatism:0}),rc3=calc(40,25,VPMB,{conservatism:3});
  assert('C3 deco ≥ C0 deco',     !rc0.error&&!rc3.error&&deco(rc3)>=deco(rc0),
    `C0=${deco(rc0).toFixed(0)} C3=${deco(rc3).toFixed(0)}min`,'');
  assert('C3 runtime ≥ C0 runtime',!rc0.error&&!rc3.error&&(rc3.totalRuntime||0)>=(rc0.totalRuntime||0),
    `C0=${rc0.totalRuntime?.toFixed(1)} C3=${rc3.totalRuntime?.toFixed(1)}min`,'');

  // ── 8. Result shape ───────────────────────────────────────────────────
  sec('8 · Result shape (40m/25min, VPM-B)');
  const rs=calc(40,25,VPMB);
  assert('error===null',         !rs.error&&rs.error===null,               `error=${rs.error}`,'');
  assert('plan is array',        !rs.error&&Array.isArray(rs.plan),        `len=${rs.plan?.length}`,'');
  assert('stops is array',       !rs.error&&Array.isArray(rs.stops),       `len=${rs.stops?.length}`,'');
  assert('totalRuntime number',  !rs.error&&typeof rs.totalRuntime==='number',`type=${typeof rs.totalRuntime}`,'');
  const ty=!rs.error?[...new Set(rs.plan?.map(s=>s.type))]:[];
  assert('plan: descent seg',    ty.includes('descent'),`segs=[${ty}]`,'');
  assert('plan: bottom seg',     ty.includes('bottom'),'','');
  assert('plan: stop seg',       ty.includes('stop'),'','');

  // ── 9. O₂ tracking ───────────────────────────────────────────────────
  sec('9 · O₂ tracking — CNS & OTU (40m/25min)');
  const ro=calc(40,25,VPMB);
  assert('totalCNS is finite',  !ro.error&&Number.isFinite(ro.totalCNS),   `CNS=${ro.totalCNS?.toFixed(1)}%`,'');
  assert('totalOTU is finite',  !ro.error&&Number.isFinite(ro.totalOTU),   `OTU=${ro.totalOTU}`,'');
  assert('CNS in 0–200%',       !ro.error&&ro.totalCNS>=0&&ro.totalCNS<200,`${ro.totalCNS?.toFixed(1)}%`,'');
  assert('OTU > 0',             !ro.error&&(ro.totalOTU||0)>0,             `OTU=${ro.totalOTU}`,'');

  // ── 10. Water density ─────────────────────────────────────────────────
  sec('10 · Water density (40m/25min, VPM-B)');
  const rS=calc(40,25,VPMB,{waterType:0}),rF=calc(40,25,VPMB,{waterType:1});
  assert('salt water computes',  !rS.error&&(rS.totalRuntime||0)>0, rS.error||`rt=${rS.totalRuntime?.toFixed(1)}min`,'waterType:0');
  assert('fresh water computes', !rF.error&&(rF.totalRuntime||0)>0, rF.error||`rt=${rF.totalRuntime?.toFixed(1)}min`,'waterType:1');
  assert('fresh ≥ salt runtime', !rS.error&&!rF.error&&(rF.totalRuntime||0)>=(rS.totalRuntime||0),
    `salt=${rS.totalRuntime?.toFixed(1)} fresh=${rF.totalRuntime?.toFixed(1)}min`,'density');

  finalize();
}

function finalize(){
  const tot=P+F+SK,ok=F===0;
  document.getElementById('sumbar').innerHTML=
    `<span class="pill ${ok?'p':'f'}">${ok?'✓':'✗'} ${P}/${tot} PASSED</span>`+
    (F?`<span class="pill f">✗ ${F} FAILED</span>`:'')+
    (SK?`<span class="pill s">— ${SK} SKIPPED</span>`:'')+
    `<span style="color:var(--${ok?'pass':'fail'});font-size:13px;margin-left:4px">${ok?'All tests passed ✓':`${F} test${F!==1?'s':''} failed`}</span>`;
}

loadEngine().then(R=>{
  smsg.textContent='Running tests…';
  runTests(R??{});
}).catch(e=>{
  log('Fatal: '+e.message+'\n'+e.stack);
  smsg.textContent='⚠ Fatal — see debug log';
  runTests({});
});
</script>
</body>
</html>
